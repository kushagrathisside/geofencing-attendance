name: attendance_app
description: Lecture attendance — instructor & student app.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  http: ^1.2.0

  # GPS
  geolocator: ^12.0.0

  # Device fingerprint
  device_info_plus: ^10.1.0

  # QR code display
  qr_flutter: ^4.1.0

  # QR scanner (instructor scans nothing, but student could scan)
  mobile_scanner: ^5.1.0

  # State management
  provider: ^6.1.2

  # URL strategy (remove # from Flutter web URLs)
  url_strategy: ^0.2.0

  # Share / download CSV
  share_plus: ^9.0.0
  path_provider: ^2.1.3

  cupertino_icons: ^1.0.6

  url_launcher: ^6.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
