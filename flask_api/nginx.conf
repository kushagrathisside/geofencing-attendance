worker_processes auto;

events { worker_connections 2048; multi_accept on; }

http {
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=15r/s;

    upstream python_backend {
        # Because Nginx is on the host network, it hits the port exposed by Docker
        server 127.0.0.1:5000;
    }

    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate /etc/ssl/certs/fullchain.pem;
        ssl_certificate_key /etc/ssl/certs/privkey.pem;

        # Hardened TLS Settings
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        location / {
            limit_req zone=api_limit burst=30 nodelay;
            
            proxy_pass http://python_backend;
            
            # Since Nginx is on Host Mode, $remote_addr is the true LAN IP
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Host $host;
        }
    }
}